services:

  traefik:
    image: traefik:v3.6
    container_name: traefik
    ports:
      - "80:80"
      - "81:81"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
    restart: unless-stopped
    networks:
      web:
        ipv4_address: 172.20.0.2

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "0.0.0.0:6379:6379"
    networks:
      web:
        ipv4_address: 172.20.0.22

  pocketid:
    image: ghcr.io/pocket-id/pocket-id:v2.2.0
    container_name: pocketid
    environment:
      - APP_URL=https://auth.${DOMAIN}
      - TRUST_PROXY=true
      - ENCRYPTION_KEY=${POCKETID_ENCRYPTION_KEY}
      - MAXMIND_LICENSE_KEY=
    volumes:
      - /mnt/data/docker/pocketid/data:/app/data
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pocketid.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.pocketid.entrypoints=web-noauth"
      - "traefik.http.services.pocketid.loadbalancer.server.port=1411"
    networks:
      web:
        ipv4_address: 172.20.0.5

  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v4
    container_name: tinyauth
    environment:
      - APP_URL=https://login.${DOMAIN}
      - SECRET=${TINYAUTH_SECRET}
      - COOKIE_DOMAIN=.${DOMAIN}
      - PROVIDERS_POCKETID_CLIENT_ID=${TINYAUTH_OIDC_CLIENT_ID}
      - PROVIDERS_POCKETID_CLIENT_SECRET=${TINYAUTH_OIDC_CLIENT_SECRET}
      - PROVIDERS_POCKETID_AUTH_URL=https://auth.${DOMAIN}/authorize
      - PROVIDERS_POCKETID_TOKEN_URL=https://auth.${DOMAIN}/api/oidc/token
      - PROVIDERS_POCKETID_USER_INFO_URL=https://auth.${DOMAIN}/api/oidc/userinfo
      - PROVIDERS_POCKETID_REDIRECT_URL=https://login.${DOMAIN}/api/oauth/callback/pocketid
      - PROVIDERS_POCKETID_SCOPES=openid email profile groups
      - PROVIDERS_POCKETID_NAME=Pocket ID
      - OAUTH_AUTO_REDIRECT=pocketid
    volumes:
      - /mnt/data/docker/tinyauth/data:/app/data
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tinyauth.rule=Host(`login.${DOMAIN}`)"
      - "traefik.http.routers.tinyauth.entrypoints=web-noauth"
      - "traefik.http.routers.tinyauth.service=tinyauth"
      - "traefik.http.services.tinyauth.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.tinyauth.forwardauth.address=http://tinyauth:3000/api/auth/traefik"
      - "traefik.http.middlewares.tinyauth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.tinyauth.forwardauth.authResponseHeaders=Remote-User,Remote-Email,Remote-Name,Remote-Groups"
    networks:
      web:
        ipv4_address: 172.20.0.6

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    restart: unless-stopped
    networks:
      web:
        ipv4_address: 172.20.0.3
    depends_on:
      - traefik

  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    ports:
      - "0.0.0.0:3552:3552"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/data/docker/arcane/data:/app/data
    env_file: .env
    environment:
      - APP_URL=https://arcane.${DOMAIN}
      - ENCRYPTION_KEY=${ARCANE_ENCRYPTION_KEY}
      - JWT_SECRET=${ARCANE_JWT_SECRET}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arcane.rule=Host(`arcane.${DOMAIN}`)"
      - "traefik.http.services.arcane.loadbalancer.server.port=3552"
    networks:
      web:
        ipv4_address: 172.20.0.4

  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: jellyfin
    ports:
      - "8096:8096"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/jellyfin/config:/config
      - /mnt/data/docker/jellyfin/cache:/cache
      - /mnt/nas/media:/media:ro
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    networks:
      web:
        ipv4_address: 172.20.0.10

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "127.0.0.1:8989:8989"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/sonarr/config:/config
      - /mnt/nas/media:/media
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    networks:
      web:
        ipv4_address: 172.20.0.11

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "127.0.0.1:7878:7878"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/radarr/config:/config
      - /mnt/nas/media:/media
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    networks:
      web:
        ipv4_address: 172.20.0.12

  lidarr:
    image: linuxserver/lidarr:latest
    container_name: lidarr
    ports:
      - "127.0.0.1:8686:8686"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/lidarr/config:/config
      - /mnt/nas/media:/media
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.${DOMAIN}`)"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
    networks:
      web:
        ipv4_address: 172.20.0.13

  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    user: "0:0"
    environment:
      - TZ=Europe/Brussels
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_SONARR_0_PATHS_0=/media/downloads
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_RADARR_0_PATHS_0=/media/downloads
      - UN_LIDARR_0_URL=http://lidarr:8686
      - UN_LIDARR_0_API_KEY=${LIDARR_API_KEY}
      - UN_LIDARR_0_PATHS_0=/media/downloads
    volumes:
      - /mnt/nas/media:/media
    restart: unless-stopped
    networks:
      web:
        ipv4_address: 172.20.0.23

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    ports:
      - "127.0.0.1:5055:5055"
    environment:
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/jellyseerr/config:/app/config
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN}`)"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
    networks:
      web:
        ipv4_address: 172.20.0.14

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    ports:
      - "32400:32400"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Brussels
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    volumes:
      - /mnt/data/docker/plex/config:/config
      - /mnt/nas/media:/media:ro
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plex.rule=Host(`plex.${DOMAIN}`)"
      - "traefik.http.services.plex.loadbalancer.server.port=32400"
    networks:
      web:
        ipv4_address: 172.20.0.17

  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    ports:
      - "127.0.0.1:6767:6767"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/bazarr/config:/config
      - /mnt/nas/media:/media
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
    networks:
      web:
        ipv4_address: 172.20.0.16

  linkding:
    image: sissbruecker/linkding:latest
    container_name: linkding
    environment:
      - LD_SUPERUSER_NAME=${LINKDING_SUPERUSER_NAME}
      - LD_SUPERUSER_PASSWORD=${LINKDING_SUPERUSER_PASSWORD}
      - LD_CSRF_TRUSTED_ORIGINS=https://links.${DOMAIN}
      - LD_ENABLE_OIDC=${LINKDING_ENABLE_OIDC:-}
      # linkding uses mozilla-django-oidc — needs explicit OIDC_* endpoints (no provider-URL auto-discovery)
      - OIDC_RP_CLIENT_ID=${LINKDING_OIDC_CLIENT_ID:-}
      - OIDC_RP_CLIENT_SECRET=${LINKDING_OIDC_CLIENT_SECRET:-}
      - OIDC_OP_AUTHORIZATION_ENDPOINT=https://auth.${DOMAIN}/authorize
      - OIDC_OP_TOKEN_ENDPOINT=https://auth.${DOMAIN}/api/oidc/token
      - OIDC_OP_USER_ENDPOINT=https://auth.${DOMAIN}/api/oidc/userinfo
      - OIDC_OP_JWKS_ENDPOINT=https://auth.${DOMAIN}/.well-known/jwks.json
    volumes:
      - /mnt/data/docker/linkding/data:/etc/linkding/data
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.linkding.rule=Host(`links.${DOMAIN}`)"
      - "traefik.http.services.linkding.loadbalancer.server.port=9090"
    networks:
      web:
        ipv4_address: 172.20.0.15

  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    container_name: forgejo
    ports:
      - "0.0.0.0:3001:3000"
      # 2222 = canonical git SSH (inherited from retired Gitea); 2223 kept for any
      # legacy clients during transition.
      - "0.0.0.0:2222:22"
      - "0.0.0.0:2223:22"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      # ROOT_URL is the public web URL so web-UI clone links, e-mails, webhooks
      # and the PocketID OAuth2 callback are all correct (and the admin "ROOT_URL
      # mismatch" warning is gone). TRADEOFF (accepted 2026-06-13): Forgejo derives
      # the container-registry bearer-token *realm* from ROOT_URL too, so LAN
      # clients pulling 192.168.0.159:3001 now fetch their (small) token via
      # git.${DOMAIN} through Cloudflare — image blobs still go LAN-direct to :3001.
      # The /v2/token path rides web-noauth (:81), so it bypasses tinyauth.
      - FORGEJO__server__ROOT_URL=https://git.${DOMAIN}
      - FORGEJO__server__SSH_DOMAIN=git.${DOMAIN}
      - FORGEJO__server__SSH_PORT=2222
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__service__DISABLE_REGISTRATION=false
      - FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION=true
      - FORGEJO__service__SHOW_REGISTRATION_BUTTON=false
      # Privacy posture (set 2026-06-14): git endpoints ride web-noauth (:81),
      # bypassing tinyauth so the git CLI works — which means Forgejo's OWN visibility
      # controls are the only gate on git.${DOMAIN}. So lock them down:
      # REQUIRE_SIGNIN_VIEW = nothing is browseable/cloneable anonymously over the
      # internet; DEFAULT_PRIVATE = new repos are created private by default (the
      # create form still lets you choose Public manually per-repo).
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=true
      - FORGEJO__repository__DEFAULT_PRIVATE=private
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__actions__ENABLED=true
      - FORGEJO__packages__ENABLED=true
    volumes:
      - /mnt/data/docker/forgejo/data:/data
    env_file: .env
    restart: unless-stopped
    labels:
      # git.${DOMAIN} is the primary host (Forgejo is now the primary git server).
      # web-noauth entrypoint (:81) keeps git CLI / HTTP off the tinyauth forwardAuth;
      # the web UI is protected by Forgejo's own login + PocketID OIDC.
      - "traefik.enable=true"
      - "traefik.http.routers.forgejo.rule=Host(`git.${DOMAIN}`)"
      - "traefik.http.routers.forgejo.entrypoints=web-noauth"
      - "traefik.http.routers.forgejo.service=forgejo"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3000"
    networks:
      web:
        ipv4_address: 172.20.0.21

  # gitea — RETIRED 2026-06-13. Forgejo is now the primary git server (git.${DOMAIN}).
  # All 6 keeper repos + the container registry were migrated to Forgejo; data dir
  # /mnt/data/docker/gitea/data is preserved + backed up (_premigration-backup tar).

  # --- VPN (Gluetun) ---

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "127.0.0.1:9696:9696"   # Prowlarr
      - "127.0.0.1:7474:7474"   # Autobrr
      - "127.0.0.1:8286:8286"   # Ephemera
      - "127.0.0.1:8287:8287"   # Ephemera (summarize)
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
      - OPENVPN_CUSTOM_CONFIG=/gluetun/custom.conf
      - TZ=Europe/Brussels
      - FIREWALL_OUTBOUND_SUBNETS=172.20.0.0/24,46.232.210.30/32
    volumes:
      - ./gluetun:/gluetun:ro
    extra_hosts:
      - "sonarr:172.20.0.11"
      - "radarr:172.20.0.12"
      - "lidarr:172.20.0.13"
      - "jellyfin:172.20.0.10"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.service=prowlarr"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.http.routers.autobrr.rule=Host(`autobrr.${DOMAIN}`)"
      - "traefik.http.routers.autobrr.service=autobrr"
      - "traefik.http.services.autobrr.loadbalancer.server.port=7474"
      - "traefik.http.routers.ephemera.rule=Host(`ephemera.${DOMAIN}`)"
      - "traefik.http.routers.ephemera.entrypoints=web-noauth"
      - "traefik.http.routers.ephemera.service=ephemera"
      - "traefik.http.services.ephemera.loadbalancer.server.port=8286"
      - "traefik.http.routers.summarize.rule=Host(`summarize.${DOMAIN}`)"
      - "traefik.http.routers.summarize.entrypoints=web-noauth"
      - "traefik.http.routers.summarize.service=summarize"
      - "traefik.http.services.summarize.loadbalancer.server.port=8287"
    networks:
      web:
        ipv4_address: 172.20.0.20

  # --- Behind VPN (network_mode: service:gluetun) ---

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/prowlarr/config:/config
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  autobrr:
    image: ghcr.io/autobrr/autobrr:latest
    container_name: autobrr
    environment:
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/autobrr/config:/config
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  ephemera:
    image: ephemera:latest
    pull_policy: never
    container_name: ephemera
    environment:
      - AA_BASE_URL=${AA_BASE_URL}
      - LG_BASE_URL=${LG_BASE_URL}
      - FLARESOLVERR_URL=http://127.0.0.1:8191
      - PUID=1000
      - PGID=100
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/ephemera/data:/app/data
      - /mnt/data/docker/ephemera/downloads:/app/downloads
      - /mnt/nas/books:/app/ingest
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  ephemera-summarize:
    image: ephemera:latest
    pull_policy: never
    container_name: ephemera-summarize
    environment:
      - AA_BASE_URL=${AA_BASE_URL}
      - LG_BASE_URL=${LG_BASE_URL}
      - FLARESOLVERR_URL=http://127.0.0.1:8191
      - PORT=8287
      - PUID=1000
      - PGID=100
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/ephemera-summarize/data:/app/data
      - /mnt/data/docker/ephemera-summarize/downloads:/app/downloads
      - /mnt/nas/books-to-summarize:/app/ingest
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=Europe/Brussels
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  # --- Books (Booklore + MariaDB) ---

  booklore:
    image: ghcr.io/booklore-app/booklore:latest
    container_name: booklore
    environment:
      - APP_USER_ID=0
      - APP_GROUP_ID=0
      - TZ=Europe/Brussels
      - DATABASE_URL=jdbc:mariadb://booklore-db:3306/booklore
      - DATABASE_USERNAME=booklore
      - DATABASE_PASSWORD=${BOOKLORE_DB_PASSWORD}
    volumes:
      - /mnt/data/docker/booklore/data:/app/data
      - /mnt/nas/books:/books
      - /mnt/data/docker/booklore/bookdrop:/bookdrop
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.booklore.rule=Host(`books.${DOMAIN}`)"
      - "traefik.http.services.booklore.loadbalancer.server.port=6060"
    networks:
      web:
        ipv4_address: 172.20.0.18
    depends_on:
      - booklore-db

  booklore-db:
    image: mariadb:11.4
    container_name: booklore-db
    environment:
      - MYSQL_ROOT_PASSWORD=${BOOKLORE_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=booklore
      - MYSQL_USER=booklore
      - MYSQL_PASSWORD=${BOOKLORE_DB_PASSWORD}
      - TZ=Europe/Brussels
    volumes:
      - /mnt/data/docker/booklore-db/data:/var/lib/mysql
    restart: unless-stopped
    networks:
      web:
        ipv4_address: 172.20.0.19

networks:
  web:
    driver: bridge
    ipam:
      config:
        # Static reservations live in .2-.127 (assigned explicitly per service).
        # Auto-assigned IPs (containers without ipv4_address, incl. external
        # joiners) are confined to .128+ so they can never collide with a
        # reserved static address while its owner is briefly down.
        - subnet: 172.20.0.0/24
          ip_range: 172.20.0.128/25
