all:
  hosts:
    proxmox:
      ansible_host: 192.168.0.158
      ansible_python_interpreter: /usr/bin/python3
    docker_host:
      ansible_host: 192.168.0.159
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    ai_lxc:
      ansible_host: 192.168.0.163
      ansible_user: root
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    dev_lxc:
      ansible_host: 192.168.0.164
      ansible_user: root
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    hive:
      ansible_host: 192.168.0.167
      ansible_user: root
      ansible_python_interpreter: /usr/bin/python3
      # RemoteCommand=none + RequestTTY=no: a `Host hive 192.168.0.167` block in
      # the operator's ~/.ssh/config carries `RemoteCommand cd /opt/hive` (so
      # `ssh hive` drops into the repo). That pattern also matches Ansible's
      # connection by IP, which otherwise fails with "Cannot execute command-line
      # and remote command". Override it here so applies are immune to ssh config.
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o RemoteCommand=none -o RequestTTY=no"
    laptop1:
      ansible_host: 192.168.0.165
      ansible_user: root
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    laptop2:
      ansible_host: 192.168.0.166
      ansible_user: root
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
