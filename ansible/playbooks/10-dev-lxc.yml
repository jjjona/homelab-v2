---
# 10-dev-lxc.yml
# Creates a remote development LXC 204 (.164) with:
#   - User jjjona with sudo + SSH key
#   - Docker Engine (for devcontainers)
#   - Git configured (jonathan / jonathan@dropsolid.com)
#   - openfortivpn for FortiClient VPN
#   - TUN device passthrough for VPN
#
# SSH access from anywhere via Cloudflare Tunnel (add hostname in Cloudflare dashboard).
#
# Run with --tags destroy to tear down:
#   ansible-playbook playbooks/10-dev-lxc.yml --tags destroy

# =============================================================
# Play 0: Destroy Dev LXC (only with --tags destroy)
# =============================================================
- name: Destroy Dev LXC
  hosts: proxmox
  gather_facts: false
  tags: [destroy, never]

  tasks:

    - name: Stop and destroy LXC 204 (dev)
      ansible.builtin.shell: pct stop 204 && pct destroy 204
      ignore_errors: true
      changed_when: true

    - name: Show destruction complete
      ansible.builtin.debug:
        msg: "Dev LXC 204 destroyed. Re-run without --tags destroy to recreate."

# =============================================================
# Play 1: Proxmox host — Create Dev LXC 204
# =============================================================
- name: Create Dev LXC
  hosts: proxmox
  gather_facts: false
  tags: [create, lxc]

  vars:
    ct_id: 204
    ct_hostname: dev
    ct_ip: 192.168.0.164
    ct_gw: 192.168.0.1
    ct_memory: 16384
    ct_swap: 2048
    ct_cores: 4
    ct_rootfs_size: 100
    ct_template: debian-12-standard_12.12-1_amd64.tar.zst
    ct_template_storage: local
    ssh_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFG9NoQSuVYiBD5fib0bN43e2UWwH5iEeDy99cCsHrHC"

  tasks:

    - name: Check if LXC {{ ct_id }} exists
      ansible.builtin.command: pct status {{ ct_id }}
      register: ct_check
      ignore_errors: true
      changed_when: false

    - name: Skip if LXC {{ ct_id }} is already running
      ansible.builtin.debug:
        msg: "LXC {{ ct_id }} already exists ({{ ct_check.stdout | default('') }}), skipping creation"
      when: ct_check.rc == 0

    - name: Create LXC {{ ct_id }}
      when: ct_check.rc != 0
      block:

        - name: Update container template index
          ansible.builtin.command: pveam update
          changed_when: false

        - name: Download Debian CT template
          ansible.builtin.command: >
            pveam download {{ ct_template_storage }} {{ ct_template }}
          register: template_download
          changed_when: "'already exists' not in template_download.stdout"
          failed_when:
            - template_download.rc != 0
            - "'already exists' not in template_download.stderr"

        - name: Write SSH public key to temp file
          ansible.builtin.copy:
            dest: /tmp/ct-ssh-pubkey.pub
            content: "{{ ssh_pubkey }}\n"
            mode: "0600"

        - name: Create LXC {{ ct_id }}
          ansible.builtin.command: >
            pct create {{ ct_id }}
            {{ ct_template_storage }}:vztmpl/{{ ct_template }}
            --hostname {{ ct_hostname }}
            --unprivileged 1
            --features nesting=1,keyctl=1
            --rootfs local-lvm:{{ ct_rootfs_size }}
            --memory {{ ct_memory }}
            --swap {{ ct_swap }}
            --cores {{ ct_cores }}
            --net0 name=eth0,bridge=vmbr0,ip={{ ct_ip }}/24,gw={{ ct_gw }},firewall=0
            --nameserver 1.1.1.1
            --onboot 1
            --start 0
            --ssh-public-keys /tmp/ct-ssh-pubkey.pub

        # --- TUN device passthrough (for openfortivpn) ---

        - name: Add TUN device passthrough to LXC config
          ansible.builtin.blockinfile:
            path: "/etc/pve/lxc/{{ ct_id }}.conf"
            marker: "# {mark} TUN PASSTHROUGH"
            block: |
              lxc.cgroup2.devices.allow: c 10:200 rwm
              lxc.mount.entry: /dev/net dev/net none bind,create=dir

        - name: Load PPP kernel modules on host
          ansible.builtin.command: modprobe {{ item }}
          loop:
            - ppp_generic
            - ppp_async
            - ppp_deflate
            - ppp_mppe
          changed_when: false

        - name: Persist PPP modules across reboots
          ansible.builtin.copy:
            dest: /etc/modules-load.d/ppp.conf
            content: |
              ppp_generic
              ppp_async
              ppp_deflate
              ppp_mppe
            owner: root
            group: root
            mode: "0644"

        - name: Set /dev/ppp permissions for unprivileged LXC
          ansible.builtin.file:
            path: /dev/ppp
            owner: "100000"
            group: "100000"
            mode: "0660"

        - name: Add PPP device passthrough to LXC config
          ansible.builtin.blockinfile:
            path: "/etc/pve/lxc/{{ ct_id }}.conf"
            marker: "# {mark} PPP PASSTHROUGH"
            block: |
              lxc.cgroup2.devices.allow: c 108:0 rwm
              lxc.mount.entry: /dev/ppp dev/ppp none bind,optional,create=file

        - name: Ensure /dev/net/tun exists on host
          ansible.builtin.command: mknod /dev/net/tun c 10 200
          args:
            creates: /dev/net/tun

        - name: Set TUN device permissions for unprivileged LXC
          ansible.builtin.file:
            path: /dev/net/tun
            owner: "100000"
            group: "100000"
            mode: "0660"

        - name: Start LXC {{ ct_id }}
          ansible.builtin.command: pct start {{ ct_id }}

        - name: Wait for LXC systemd to be ready
          ansible.builtin.command: pct exec {{ ct_id }} -- systemctl is-system-running --wait
          register: systemd_ready
          retries: 12
          delay: 5
          until: systemd_ready.rc == 0 or (systemd_ready.stdout is defined and 'running' in systemd_ready.stdout)
          changed_when: false

        - name: Remove temp SSH key file
          ansible.builtin.file:
            path: /tmp/ct-ssh-pubkey.pub
            state: absent

    - name: Ensure LXC {{ ct_id }} is started
      ansible.builtin.command: pct start {{ ct_id }}
      register: start_result
      failed_when:
        - start_result.rc != 0
        - "'already running' not in start_result.stderr"
      changed_when: start_result.rc == 0

    - name: Verify LXC {{ ct_id }} status
      ansible.builtin.command: pct status {{ ct_id }}
      register: ct_status
      changed_when: false

    - name: Show LXC {{ ct_id }} status
      ansible.builtin.debug:
        var: ct_status.stdout

# =============================================================
# Play 2: Dev LXC — provision user, Docker, Git, VPN
# =============================================================
- name: Provision Dev LXC
  hosts: dev_lxc
  gather_facts: false
  tags: [provision]

  vars:
    dev_user: jjjona
    ssh_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFG9NoQSuVYiBD5fib0bN43e2UWwH5iEeDy99cCsHrHC"

  pre_tasks:
    - name: Wait for SSH connection
      ansible.builtin.wait_for_connection:
        timeout: 60

    - name: Gather facts
      ansible.builtin.setup:

  tasks:

    # ==========================================================
    # Base packages
    # ==========================================================

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3
          - wget
          - jq
          - sudo
          - openssh-server
          - git
          - htop
          - unzip
          - build-essential
          - tmux
        state: present
        update_cache: true

    # ==========================================================
    # User setup
    # ==========================================================

    - name: Create user {{ dev_user }}
      ansible.builtin.user:
        name: "{{ dev_user }}"
        shell: /bin/bash
        groups: sudo
        append: true
        create_home: true

    - name: Allow {{ dev_user }} passwordless sudo
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ dev_user }}"
        content: "{{ dev_user }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Create .ssh directory for {{ dev_user }}
      ansible.builtin.file:
        path: "/home/{{ dev_user }}/.ssh"
        state: directory
        owner: "{{ dev_user }}"
        group: "{{ dev_user }}"
        mode: "0700"

    - name: Add SSH authorized key for {{ dev_user }}
      ansible.builtin.copy:
        dest: "/home/{{ dev_user }}/.ssh/authorized_keys"
        content: |
          {{ ssh_pubkey }}
          ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPWruuYYk7NyzXmZZgAU8zACed1WED4cmn1dCL7Gj4RN jonathanadmin@MacBook-Pro-van-Jonathan.local
        owner: "{{ dev_user }}"
        group: "{{ dev_user }}"
        mode: "0600"

    # ==========================================================
    # Git config
    # ==========================================================

    - name: Configure git user.name
      ansible.builtin.command: git config --global user.name "jonathan"
      become: true
      become_user: "{{ dev_user }}"
      changed_when: true

    - name: Configure git user.email
      ansible.builtin.command: git config --global user.email "jonathan@dropsolid.com"
      become: true
      become_user: "{{ dev_user }}"
      changed_when: true

    # ==========================================================
    # Docker Engine
    # ==========================================================

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: >
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/debian
          {{ ansible_facts['distribution_release'] }} stable
        mode: "0644"

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Configure Docker daemon
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "storage-driver": "overlay2",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
        owner: root
        group: root
        mode: "0644"
      notify: restart docker

    - name: Add {{ dev_user }} to docker group
      ansible.builtin.user:
        name: "{{ dev_user }}"
        groups: docker
        append: true

    - name: Enable Docker and containerd
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - docker
        - containerd

    # ==========================================================
    # openfortivpn
    # ==========================================================

    - name: Install openfortivpn
      ansible.builtin.apt:
        name:
          - openfortivpn
          - ppp
        state: present

    # ==========================================================
    # Verify
    # ==========================================================

    - name: Check Docker version
      ansible.builtin.command: docker version
      register: docker_version
      changed_when: false

    - name: Show Docker version
      ansible.builtin.debug:
        var: docker_version.stdout_lines

    - name: Run hello-world test
      ansible.builtin.command: docker run --rm hello-world
      register: hello_world
      changed_when: false

    - name: Show hello-world output
      ansible.builtin.debug:
        var: hello_world.stdout_lines

    - name: Check git config
      ansible.builtin.command: git config --global --list
      become: true
      become_user: "{{ dev_user }}"
      register: git_config
      changed_when: false

    - name: Show git config
      ansible.builtin.debug:
        var: git_config.stdout_lines

    - name: Check openfortivpn installed
      ansible.builtin.command: openfortivpn --version
      register: vpn_version
      changed_when: false
      ignore_errors: true

    - name: Show openfortivpn version
      ansible.builtin.debug:
        var: vpn_version.stdout

    - name: Show access info
      ansible.builtin.debug:
        msg:
          - "Dev LXC 204 provisioned at 192.168.0.164"
          - "User: {{ dev_user }} (passwordless sudo, docker group)"
          - "Git: jonathan <jonathan@dropsolid.com>"
          - "Docker: ready for devcontainers"
          - "VPN: openfortivpn installed, configure /etc/openfortivpn/config"
          - "SSH: add dev.DOMAIN hostname to Cloudflare Tunnel config"

  handlers:
    - name: restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
